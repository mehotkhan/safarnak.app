name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.daemon=true -Dorg.gradle.workers.max=4 -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dkotlin.compiler.execution.strategy=in-process'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history to properly detect commit messages
          fetch-tags: true  # Fetch all tags to properly detect last release

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      # -----------------------
      # Versioning (no deps required)
      # -----------------------
      - name: Determine semantic version bump
        id: version_bump
        run: |
          node <<'NODE'
          const fs = require('fs');
          const cp = require('child_process');
          const output = (key, value) => fs.appendFileSync(process.env.GITHUB_OUTPUT, `${key}=${value}\n`);
          const run = (command, fallback = '') => {
            try {
              return cp.execSync(command, { encoding: 'utf8', stdio: ['ignore', 'pipe', 'ignore'] }).trim();
            } catch {
              return fallback;
            }
          };
          const isIgnoredCommit = (message) => {
            const firstLine = message.trim().split('\n')[0];
            return (
              /^chore\s*[:(]\s*bump\s+version/i.test(firstLine) ||
              /^chore\s*[:(]\s*release/i.test(firstLine) ||
              message.includes('[skip ci]')
            );
          };
          const isBreaking = (message) => {
            const firstLine = message.trim().split('\n')[0];
            return message.includes('BREAKING CHANGE') || /^[^:]+!:/.test(firstLine);
          };
          const versionCode = (version) => {
            const [major, minor, patch] = version.split('.').map(n => parseInt(n, 10) || 0);
            return major * 10000 + minor * 100 + patch;
          };

          run('git fetch origin --tags --force');

          const packageVersion = JSON.parse(fs.readFileSync('package.json', 'utf8')).version.trim();
          const latestTag = run('git tag --sort=-version:refname')
            .split('\n')
            .find(tag => /^v\d+\.\d+\.\d+$/.test(tag)) || '';
          const baseVersion = latestTag ? latestTag.slice(1) : packageVersion;
          const range = latestTag ? `${latestTag}..HEAD` : 'HEAD';
          const rawLog = run(`git log ${range} --format=%B%x1e --no-merges --reverse`);
          const commits = rawLog
            .split('\x1e')
            .map(message => message.trim())
            .filter(Boolean)
            .filter(message => !isIgnoredCommit(message));

          let bumpType = 'skip';
          const next = baseVersion.split('.').map(n => parseInt(n, 10) || 0);
          const breaking = commits.some(isBreaking);
          const features = commits.filter(message => /^(feat|feature)(\(|:)/i.test(message.split('\n')[0])).length;
          const fixes = commits.filter(message => /^(fix|bugfix)(\(|:)/i.test(message.split('\n')[0])).length;

          if (breaking) {
            bumpType = 'major';
            next[0] += 1;
            next[1] = 0;
            next[2] = 0;
          } else if (features > 0) {
            bumpType = 'minor';
            next[1] += features;
            next[2] = 0;
          } else if (fixes > 0) {
            bumpType = 'patch';
            next[2] += fixes;
          }

          const version = bumpType === 'skip' ? baseVersion : next.join('.');
          const shouldRelease = bumpType !== 'skip';

          output('version', version);
          output('version_code', versionCode(version));
          output('base_version', baseVersion);
          output('last_tag', latestTag);
          output('bump_type', bumpType);
          output('commit_count', commits.length);
          output('feature_count', features);
          output('fix_count', fixes);
          output('should_release', shouldRelease);

          console.log(`Package version: ${packageVersion}`);
          console.log(`Latest release tag: ${latestTag || 'none'}`);
          console.log(`Base version: ${baseVersion}`);
          console.log(`Commits considered: ${commits.length}`);
          console.log(`Features: ${features}, fixes: ${fixes}, breaking: ${breaking}`);
          console.log(`Release decision: ${version} (${bumpType}), should_release=${shouldRelease}`);
          NODE

      - name: Apply version bump
        if: steps.version_bump.outputs.should_release == 'true'
        run: |
          NEW_VERSION=${{ steps.version_bump.outputs.version }}
          
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${NEW_VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            fs.writeFileSync('worker/version.ts', [
              \"export const DEFAULT_APP_VERSION = '${NEW_VERSION}';\",
              '',
              'export const resolveAppVersion = (env?: { APP_VERSION?: string }): string => {',
              '  return env?.APP_VERSION || DEFAULT_APP_VERSION;',
              '};',
              '',
            ].join('\n'));
            console.log('✅ package.json and worker/version.ts updated to ${NEW_VERSION}');
          "

      - name: Write production .env for runner
        if: steps.version_bump.outputs.should_release == 'true'
        run: |
          cat > .env <<EOF
          APP_VERSION=${{ steps.version_bump.outputs.version }}
          ANDROID_VERSION_CODE=${{ steps.version_bump.outputs.version_code }}
          APP_VARIANT=prod
          EXPO_PUBLIC_APP_VARIANT=prod
          APP_NAME=سفرناک
          APP_SCHEME=safarnak
          BUNDLE_IDENTIFIER=ir.mohet.safarnak
          EXPO_PUBLIC_GRAPHQL_URL=https://safarnak.app/graphql
          GRAPHQL_URL=https://safarnak.app/graphql
          EOF
          sed -i 's/^[[:space:]]*//' .env
          cat .env >> "$GITHUB_ENV"
          echo "✅ Runner .env written for version ${{ steps.version_bump.outputs.version }}"

      # -----------------------
      # Heavy steps only when releasing
      # -----------------------
      - name: Install dependencies
        if: steps.version_bump.outputs.should_release == 'true'
        run: |
          yarn install --frozen-lockfile --prefer-offline --no-progress --network-timeout 100000
          echo "Dependencies installed successfully"

      - name: Setup Java
        if: steps.version_bump.outputs.should_release == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          check-latest: false

      - name: Setup Gradle (caching)
        if: steps.version_bump.outputs.should_release == 'true'
        uses: gradle/actions/setup-gradle@v5
        with:
          add-job-summary: never

      - name: Setup Android SDK
        if: steps.version_bump.outputs.should_release == 'true'
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - name: Cache Expo tooling
        if: steps.version_bump.outputs.should_release == 'true'
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: |
            ~/.expo
            ~/.cache/expo
          key: ${{ runner.os }}-expo-${{ hashFiles('package.json', 'yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-expo-

      - name: Cache Metro bundler
        if: steps.version_bump.outputs.should_release == 'true'
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: |
            node_modules/.cache
            /tmp/metro-*
            android/app/build/generated/assets
            android/app/build/intermediates/sourcemaps
          key: ${{ runner.os }}-metro-${{ hashFiles('package.json', 'yarn.lock', 'app.config.*', 'app.json', 'babel.config.*', 'metro.config.*') }}
          restore-keys: |
            ${{ runner.os }}-metro-

      # Android files are now tracked in git, no prebuild needed
      # Version code is passed via ANDROID_VERSION_CODE env variable

      # Android files are tracked in git, versioning is handled via env variables

      - name: Validate production Expo config
        if: steps.version_bump.outputs.should_release == 'true'
        run: npx expo config --json > /tmp/safarnak-prod-expo-config.json

      - name: Make Gradle wrapper executable
        if: steps.version_bump.outputs.should_release == 'true'
        run: chmod +x android/gradlew

      - name: Prepare Android release signing
        if: steps.version_bump.outputs.should_release == 'true'
        run: |
          if [ -z "$SAFARNAK_ANDROID_KEYSTORE_BASE64" ]; then
            echo "❌ SAFARNAK_ANDROID_KEYSTORE_BASE64 is required for production release signing"
            exit 1
          fi
          if [ -z "$SAFARNAK_ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$SAFARNAK_ANDROID_KEY_ALIAS" ] || [ -z "$SAFARNAK_ANDROID_KEY_PASSWORD" ]; then
            echo "❌ Release signing password/alias secrets are required"
            exit 1
          fi
          if [ -n "$SAFARNAK_ANDROID_KEYSTORE_BASE64" ]; then
            echo "$SAFARNAK_ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
            echo "✅ Release keystore decoded"
          fi
        env:
          SAFARNAK_ANDROID_KEYSTORE_BASE64: ${{ secrets.SAFARNAK_ANDROID_KEYSTORE_BASE64 }}
          SAFARNAK_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.SAFARNAK_ANDROID_KEYSTORE_PASSWORD }}
          SAFARNAK_ANDROID_KEY_ALIAS: ${{ secrets.SAFARNAK_ANDROID_KEY_ALIAS }}
          SAFARNAK_ANDROID_KEY_PASSWORD: ${{ secrets.SAFARNAK_ANDROID_KEY_PASSWORD }}

      - name: Build Android APK (Release - Optimized)
        if: steps.version_bump.outputs.should_release == 'true'
        working-directory: android
        run: |
          ./gradlew :app:assembleProdRelease \
            --stacktrace \
            --no-daemon \
            -x lint \
            -x test \
            --build-cache \
            --parallel \
            --max-workers=4 \
            -Dorg.gradle.logging.level=quiet \
            -PreactNativeArchitectures=arm64-v8a \
            -Pandroid.enableProguardInReleaseBuilds=true \
            -Pandroid.enableMinifyInReleaseBuilds=true \
            -Pandroid.enableShrinkResourcesInReleaseBuilds=true \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableR8.fullMode=true \
            -Pandroid.enableBundleCompression=true
          
          # Verify APK was created and check size
          APK_PATH="app/build/outputs/apk/prod/release/"
          if [ -d "$APK_PATH" ]; then
            echo "✅ APK build successful"
            du -h "$APK_PATH"*.apk 2>/dev/null || echo "APK files: $(ls -la $APK_PATH/*.apk | wc -l)"
          else
            echo "⚠️  APK directory not found: $APK_PATH"
          fi
        env:
          NODE_ENV: 'production'
          SAFARNAK_ANDROID_KEYSTORE: 'release.keystore'
          SAFARNAK_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.SAFARNAK_ANDROID_KEYSTORE_PASSWORD }}
          SAFARNAK_ANDROID_KEY_ALIAS: ${{ secrets.SAFARNAK_ANDROID_KEY_ALIAS }}
          SAFARNAK_ANDROID_KEY_PASSWORD: ${{ secrets.SAFARNAK_ANDROID_KEY_PASSWORD }}
          # These are already set in gradle.properties but can be overridden
          # ANDROID_ENABLE_PROGUARD_IN_RELEASE_BUILDS: 'true'
          # ANDROID_ENABLE_MINIFY_IN_RELEASE_BUILDS: 'true'
          # ANDROID_ENABLE_SHRINK_RESOURCES_IN_RELEASE_BUILDS: 'true'

      - name: List APK files
        if: steps.version_bump.outputs.should_release == 'true'
        working-directory: android/app/build/outputs/apk/prod/release
        run: |
          ls -lh *.apk
          if [ ! -f *.apk ]; then
            echo "❌ No APK files found!"
            exit 1
          fi

      - name: Rename APK with descriptive name
        if: steps.version_bump.outputs.should_release == 'true'
        run: |
          cd android/app/build/outputs/apk/prod/release
          APK_FILE=$(ls *.apk 2>/dev/null | head -n 1)
          if [ -z "$APK_FILE" ]; then
            echo "❌ No APK file found!"
            exit 1
          fi
          NEW_NAME="Safarnak-v${{ steps.version_bump.outputs.version }}-build${{ github.run_number }}.apk"
          cp "$APK_FILE" "$NEW_NAME"
          ls -lh "$NEW_NAME"

      - name: Upload APK artifact
        if: steps.version_bump.outputs.should_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: safarnak-android-v${{ steps.version_bump.outputs.version }}-build${{ github.run_number }}
          path: android/app/build/outputs/apk/prod/release/Safarnak-v${{ steps.version_bump.outputs.version }}-build${{ github.run_number }}.apk
          retention-days: 30
          compression-level: 0
          
      - name: Generate commit list for release notes
        if: steps.version_bump.outputs.should_release == 'true'
        id: commits
        run: |
          # Fetch all tags to ensure we have the latest releases
          git fetch --tags --force 2>/dev/null || true
          
          # Get the latest release tag (matching pattern vX.Y.Z)
          LAST_TAG=$(git tag --sort=-version:refname | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | head -n 1 || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            echo "⚠️ No previous release tag found, showing all commits"
            ALL_COMMITS=$(git log --oneline --no-decorate --format="%s|||%h|||%an|||%as" --no-merges)
          else
            echo "📋 Finding ALL commits since last release: $LAST_TAG"
            # Get ALL commits since last tag, excluding version bumps
            ALL_COMMITS=$(git log ${LAST_TAG}..HEAD --oneline --no-decorate --format="%s|||%h|||%an|||%as" --no-merges | \
              grep -v "chore: bump version" | \
              grep -v "chore(release)" | \
              grep -v "\[skip ci\]" || echo "")
          fi
          
          # Count commits by type for summary
          FEAT_COUNT=0
          FIX_COUNT=0
          OTHER_COUNT=0
          TOTAL_COUNT=0
          
          # Categorize commits by type
          FEATURES=""
          FIXES=""
          REFACTORS=""
          CHORES=""
          DOCS=""
          OTHERS=""
          
          while IFS='|||' read -r msg hash author date; do
            if [ -z "$msg" ]; then continue; fi
            TOTAL_COUNT=$((TOTAL_COUNT + 1))
            
            if [[ "$msg" =~ ^feat(\(|:)|^feature(\(|:) ]]; then
              FEATURES="${FEATURES}- ✨ ${msg} (\`${hash}\`)\n"
              FEAT_COUNT=$((FEAT_COUNT + 1))
            elif [[ "$msg" =~ ^fix(\(|:)|^bugfix(\(|:) ]]; then
              FIXES="${FIXES}- 🐛 ${msg} (\`${hash}\`)\n"
              FIX_COUNT=$((FIX_COUNT + 1))
            elif [[ "$msg" =~ ^refactor(\(|:) ]]; then
              REFACTORS="${REFACTORS}- ♻️ ${msg} (\`${hash}\`)\n"
              OTHER_COUNT=$((OTHER_COUNT + 1))
            elif [[ "$msg" =~ ^chore(\(|:) ]]; then
              CHORES="${CHORES}- 🔧 ${msg} (\`${hash}\`)\n"
              OTHER_COUNT=$((OTHER_COUNT + 1))
            elif [[ "$msg" =~ ^docs(\(|:) ]]; then
              DOCS="${DOCS}- 📝 ${msg} (\`${hash}\`)\n"
              OTHER_COUNT=$((OTHER_COUNT + 1))
            elif [[ "$msg" =~ ^ci(\(|:) ]]; then
              CHORES="${CHORES}- 🔧 ${msg} (\`${hash}\`)\n"
              OTHER_COUNT=$((OTHER_COUNT + 1))
            else
              OTHERS="${OTHERS}- 🔸 ${msg} (\`${hash}\`)\n"
              OTHER_COUNT=$((OTHER_COUNT + 1))
            fi
          done <<< "$ALL_COMMITS"
          
          # Build summary
          SUMMARY="## 📊 Summary\n\n"
          if [ -n "$LAST_TAG" ]; then
            SUMMARY="${SUMMARY}Changes since **${LAST_TAG}**:\n"
          fi
          SUMMARY="${SUMMARY}- **Total commits**: ${TOTAL_COUNT}\n"
          if [ $FEAT_COUNT -gt 0 ]; then
            SUMMARY="${SUMMARY}- **New features**: ${FEAT_COUNT}\n"
          fi
          if [ $FIX_COUNT -gt 0 ]; then
            SUMMARY="${SUMMARY}- **Bug fixes**: ${FIX_COUNT}\n"
          fi
          if [ $OTHER_COUNT -gt 0 ]; then
            SUMMARY="${SUMMARY}- **Other changes**: ${OTHER_COUNT}\n"
          fi
          SUMMARY="${SUMMARY}\n"
          
          # Build formatted output with all commits
          FORMATTED="${SUMMARY}"
          
          if [ -n "$FEATURES" ]; then
            FORMATTED="${FORMATTED}### ✨ New Features\n${FEATURES}\n"
          fi
          if [ -n "$FIXES" ]; then
            FORMATTED="${FORMATTED}### 🐛 Bug Fixes\n${FIXES}\n"
          fi
          if [ -n "$REFACTORS" ]; then
            FORMATTED="${FORMATTED}### ♻️ Refactoring\n${REFACTORS}\n"
          fi
          if [ -n "$DOCS" ]; then
            FORMATTED="${FORMATTED}### 📝 Documentation\n${DOCS}\n"
          fi
          if [ -n "$CHORES" ]; then
            FORMATTED="${FORMATTED}### 🔧 Maintenance\n${CHORES}\n"
          fi
          if [ -n "$OTHERS" ]; then
            FORMATTED="${FORMATTED}### 🔸 Other Changes\n${OTHERS}\n"
          fi
          
          if [ -z "$FORMATTED" ] || [ "$TOTAL_COUNT" -eq 0 ]; then
            FORMATTED="No new commits since last release"
          fi
          
          echo "✅ Generated release notes with ${TOTAL_COUNT} commits"
          echo -e "$FORMATTED" | head -100
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo -e "$FORMATTED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit version bump if changed
        if: steps.version_bump.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json worker/version.ts
          git commit -m "chore: bump version to ${{ steps.version_bump.outputs.version }} [skip ci]" || echo "No changes to commit"
          git push origin HEAD || echo "Push failed or unnecessary"

      - name: Create GitHub Release with APK
        if: steps.version_bump.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version_bump.outputs.version }}
          name: Safarnak v${{ steps.version_bump.outputs.version }}
          body: |
            # 🚀 Safarnak v${{ steps.version_bump.outputs.version }}

            > **سفرناک** - AI-powered offline-first travel companion

            **Version**: `${{ steps.version_bump.outputs.version }}` | **Build**: #${{ github.run_number }} | **Version Code**: `${{ steps.version_bump.outputs.version_code }}`

            ${{ steps.commits.outputs.commits }}
          files: android/app/build/outputs/apk/prod/release/Safarnak-v${{ steps.version_bump.outputs.version }}-build${{ github.run_number }}.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/metro-* || true
          find ~/.gradle/caches/ -name "*.lock" -type f -delete || true
